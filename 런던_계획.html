<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><title>런던 계획</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:'Inter','Noto Sans KR',-apple-system,"Malgun Gothic",sans-serif;background:#f8fafc;color:#0f172a}
header{padding:16px 20px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:1000;box-shadow:0 1px 3px rgba(15,23,42,.04)}
header h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
header .sub{font-size:12px;color:#64748b;margin-top:4px;line-height:1.5;font-weight:500}
.tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tab{border:1px solid #e2e8f0;background:#fff;padding:9px 16px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;-webkit-user-select:none;user-select:none;transition:all .15s}
.tab:hover{background:#f1f5f9}
.tab.on.sun{background:#e11d48;border-color:#e11d48;color:#fff;box-shadow:0 4px 10px rgba(225,29,72,.25)}
.tab.on.mon{background:#0284c7;border-color:#0284c7;color:#fff;box-shadow:0 4px 10px rgba(2,132,199,.25)}
.tab.on.all{background:#0f172a;border-color:#0f172a;color:#fff;box-shadow:0 4px 10px rgba(15,23,42,.2)}
.layout{display:grid;grid-template-columns:380px 1fr;height:calc(100vh - 104px)}
#sb{overflow-y:auto;-webkit-overflow-scrolling:touch;border-right:1px solid #e2e8f0;background:#fff;padding:8px 0 24px}
#map{height:100%;width:100%;min-height:280px}
@media(max-width:820px){
  .layout{display:block;height:auto}
  #map{height:46vh;min-height:260px;position:sticky;top:104px;z-index:5}
  #sb{max-height:none;border-right:none;border-top:1px solid #e2e8f0}
  header h1{font-size:18px}
  .tab{padding:9px 13px;font-size:12.5px}
}
.db{display:none}.db.show{display:block}
.dt{font-size:11px;font-weight:800;color:#94a3b8;padding:16px 16px 6px;text-transform:uppercase;letter-spacing:.04em}
.st{display:flex;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;min-height:44px;transition:background .1s}
.st:active,.st:hover{background:#f8fafc}
.bd{flex:0 0 auto;width:26px;height:26px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.bd.sq{border-radius:7px;font-size:10px}
.st b{font-size:14.5px;display:block;margin:0 0 2px;color:#0f172a;font-weight:700}
.st .tm{display:inline-block;font-size:11px;color:#0284c7;font-weight:700;background:#f0f7ff;padding:2px 8px;border-radius:999px;margin-bottom:5px}
.st .nt{font-size:12.5px;color:#64748b;line-height:1.5}
.st a{display:inline-block;margin-top:7px;font-size:12px;color:#0284c7;text-decoration:none;font-weight:700;padding:2px 0}
.cb{margin:10px 16px 16px;border:1.5px dashed #cbd5e1;border-radius:16px;padding:10px 12px 4px;background:#f8fafc}
.cb .ct{font-size:13px;font-weight:800}.cb .ch{font-size:11.5px;color:#94a3b8;margin-bottom:6px;line-height:1.4;font-weight:500}
.cb .st{padding:9px 0}
.ni{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(45deg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.ni span{transform:rotate(-45deg)}
.qi{width:21px;height:21px;border-radius:6px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.ar{font-size:15px;font-weight:900;line-height:1;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;pointer-events:none}
.leaflet-popup-content{font-size:13px;font-family:'Inter','Noto Sans KR',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
</style></head><body>
<header><h1>런던 계획</h1><div class="sub">일요일(7/19): 학교 단체 관광 · 대영박물관 (하차 지점 미정, 시나리오 3개) &nbsp;·&nbsp; 월요일(7/20): 기차 쇼핑 데이 — Euston 10:24 도착 → 쇼핑 → Euston 18:46 출발 (Sheffield 왕복)</div>
<div class="tabs">
<div class="tab on all" data-d="all" onclick="setDay('all')">전체</div>
<div class="tab" data-d="sun" onclick="setDay('sun')">일요일 · 박물관</div>
<div class="tab" data-d="mon" onclick="setDay('mon')">월요일(20일) · 쇼핑</div>
</div></header>
<div class="layout">
<div id="sb">
<div class="db show" data-d="sun">
  <div class="dt" style="color:#e11d48">일요일 · 핵심 관광 (순서는 하차 지점따라 유동적)</div>
  <div id="l-nc"></div><div id="l-na"></div><div id="l-nb"></div>
</div>
<div class="db show" data-d="mon">
  <div class="dt" style="color:#0284c7">월요일 · 쇼핑 동선 (Euston ↔ Euston)</div>
  <div id="l-mc"></div><div id="l-mb"></div><div id="l-md"></div>
</div>
</div>
<div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="london_data.js"></script>
<script src="london_app.js"></script>
</body></html>
