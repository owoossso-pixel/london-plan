<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>런던 계획 (데모)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:'Inter','Noto Sans KR',-apple-system,"Malgun Gothic",sans-serif;background:#fff8fb;color:#3f2a3d}
header{padding:16px 20px;background:linear-gradient(135deg,#fff0f6,#f3f0ff);border-bottom:1px solid #f3d9e8;position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(219,39,119,.06)}
header h1{margin:0;font-size:21px;font-weight:800;letter-spacing:-.02em;color:#be185d}
header .sub{font-size:12px;color:#9d7593;margin-top:4px;line-height:1.5;font-weight:500}
.route-open-btn{display:none;align-items:center;gap:7px;margin-top:10px;background:rgba(255,255,255,.55);backdrop-filter:blur(10px) saturate(160%);-webkit-backdrop-filter:blur(10px) saturate(160%);border:1px solid rgba(255,255,255,.7);color:#be185d;font-size:14.5px;font-weight:800;padding:11px 18px;border-radius:999px;box-shadow:0 6px 16px rgba(190,24,93,.18);cursor:pointer}
.tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tab{border:1px solid #f3d9e8;background:#fff;padding:9px 16px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;color:#9d7593;-webkit-user-select:none;user-select:none;transition:all .15s}
.tab:hover{background:#fff0f6;transform:translateY(-1px)}
.tab.on.sun{background:linear-gradient(135deg,#fb7185,#f43f5e);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(244,63,94,.35)}
.tab.on.mon{background:linear-gradient(135deg,#38bdf8,#0ea5e9);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(14,165,233,.35)}
.tab.on.all{background:linear-gradient(135deg,#c084fc,#a855f7);border-color:transparent;color:#fff;box-shadow:0 4px 12px rgba(168,85,247,.35)}
.layout{display:grid;grid-template-columns:380px 1fr;height:calc(100vh - 112px)}
#sb{overflow-y:auto;-webkit-overflow-scrolling:touch;border-right:1px solid #f3d9e8;background:#fff;padding:8px 0 24px}
#map{height:100%;width:100%;min-height:280px}
@media(max-width:820px){
  .layout{display:block;height:auto}
  #map{height:calc(100vh - 112px);min-height:320px;width:100%}
  #sb{display:none;max-height:none;border-right:none}
  header h1{font-size:19px}
  .tab{padding:9px 13px;font-size:12.5px}
  .route-open-btn{display:inline-flex}
  #routeBackdrop{display:block}
  body.route-open #sb{
    display:block;position:fixed;left:14px;right:14px;bottom:14px;top:auto;z-index:1250;
    max-height:70vh;overflow-y:auto;background:rgba(255,255,255,.74);
    backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
    border:1px solid rgba(255,255,255,.6);border-radius:24px;
    box-shadow:0 24px 60px rgba(76,29,58,.4);
    padding-bottom:calc(10px + env(safe-area-inset-bottom));
  }
  .sb-handle{display:none}
  body.route-open .sb-handle{
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;background:rgba(255,255,255,.9);
    padding:12px 16px;font-size:13px;font-weight:800;color:#be185d;
    border-bottom:1px solid rgba(243,217,232,.7);border-radius:24px 24px 0 0;
  }
  .sb-handle button{border:none;background:rgba(253,241,246,.9);color:#be185d;width:26px;height:26px;border-radius:50%;font-size:13px;cursor:pointer}
}
.db{display:none}.db.show{display:block}
.dt{font-size:11px;font-weight:800;color:#c9a3bc;padding:16px 16px 6px;text-transform:uppercase;letter-spacing:.04em}
.st{display:flex;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #fdf1f6;min-height:44px;transition:background .1s;box-shadow:inset 4px 0 0 transparent}
.st:active,.st:hover{background:#fff8fb}
.st.now{background:#fffbeb;box-shadow:inset 4px 0 0 #f59e0b}
.bd{flex:0 0 auto;width:27px;height:27px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;box-shadow:0 3px 6px rgba(0,0,0,.18)}
.bd.sq{border-radius:8px;font-size:10px}
.st b{font-size:14.5px;display:block;margin:0 0 2px;color:#3f2a3d;font-weight:700}
.st .tm{display:inline-block;font-size:11px;color:#0ea5e9;font-weight:700;background:#f0f9ff;padding:2px 8px;border-radius:999px;margin-bottom:5px}
.st.now .tm{color:#b45309;background:#fef3c7}
.st .nt{font-size:12.5px;color:#9d7593;line-height:1.5}
.st a{display:inline-block;margin-top:7px;margin-right:8px;font-size:12px;color:#0ea5e9;text-decoration:none;font-weight:700;padding:2px 0}
.tagbtn{display:inline-flex;align-items:center;gap:3px;margin-top:7px;border:1px solid #f3d9e8;background:#fff8fb;color:#be185d;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;cursor:pointer;transition:transform .1s}
.tagbtn:hover{transform:scale(1.06);background:#fce7f3}
.tagbtn.has{background:#fce7f3;border-color:#f9a8d4}
.cb{margin:10px 16px 16px;border:1.5px dashed #f3d9e8;border-radius:18px;padding:10px 12px 4px;background:#fffafc}
.cb .ct{font-size:13px;font-weight:800}.cb .ch{font-size:11.5px;color:#c9a3bc;margin-bottom:6px;line-height:1.4;font-weight:500}
.cb .st{padding:9px 0}
.ni{width:27px;height:27px;border-radius:50% 50% 50% 0;transform:rotate(45deg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.25)}
.ni span{transform:rotate(-45deg)}
.qi{width:22px;height:22px;border-radius:7px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;border:2px solid #fff;box-shadow:0 3px 8px rgba(0,0,0,.25)}
.ar{font-size:15px;font-weight:900;line-height:1;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;pointer-events:none}
.leaflet-popup-content{font-size:13px;font-family:'Inter','Noto Sans KR',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#fdf1f6}
::-webkit-scrollbar-thumb{background:#f3c2dc;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#f0abd0}

/* 모바일: 지도가 메인, 상단바 탭하면 현재 동선이 팝업(바텀시트)으로 */
#routeBackdrop{display:none;position:fixed;inset:0;background:rgba(76,29,58,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1240}
body.route-open #routeBackdrop{opacity:1;pointer-events:auto}

/* 팀 메모 FAB */
.fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#f472b6,#a855f7);color:#fff;border:none;font-size:23px;box-shadow:0 8px 20px rgba(168,85,247,.4);z-index:1300;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s}
.fab:hover{transform:scale(1.08) rotate(-4deg)}
.badge{position:absolute;top:-4px;right:-4px;background:#f43f5e;color:#fff;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notes-backdrop{position:fixed;inset:0;background:rgba(76,29,58,.35);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1400}
.notes-backdrop.open{opacity:1;pointer-events:auto}
.notes-panel{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:#fff;border-radius:24px 24px 0 0;box-shadow:0 -10px 34px rgba(190,24,93,.18);transform:translateY(105%);transition:transform .25s ease;z-index:1500;display:flex;flex-direction:column;height:72vh;max-height:640px}
.notes-panel.open{transform:translateY(0)}
.notes-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;border-bottom:1px solid #fdf1f6}
.notes-head b{font-size:15.5px;font-weight:800;color:#be185d}
.notes-head button{border:none;background:#fdf1f6;color:#be185d;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer}
.notes-name{display:flex;gap:8px;align-items:center;padding:8px 16px;border-bottom:1px solid #fdf1f6}
.notes-name input,.notes-name select{flex:1;border:1px solid #f3d9e8;border-radius:10px;padding:7px 10px;font-size:12.5px;background:#fff;color:#3f2a3d;font-family:inherit}
.notes-name span{font-size:11px;color:#c9a3bc;font-weight:600}
.tag-chips{display:flex;gap:6px;padding:8px 16px;flex-wrap:wrap;border-bottom:1px solid #fdf1f6}
.tag-chips button{border:1px solid #f3d9e8;background:#fff;color:#9d7593;font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px;cursor:pointer;transition:all .12s}
.tag-chips button.sel{background:#fce7f3;border-color:#f472b6;color:#be185d;transform:scale(1.04)}
.notes-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.place-empty{text-align:center;color:#c9a3bc;font-size:12.5px;padding:24px 0}
.note-row{display:flex}
.note-row.me{justify-content:flex-end}
.note-bubble{position:relative;max-width:82%;background:#fdf1f6;border-radius:16px;padding:8px 12px;font-size:13px}
.note-row.me .note-bubble{background:#e0f2fe}
.note-meta{display:flex;gap:8px;align-items:baseline;margin-bottom:2px}
.note-meta b{font-size:12px;color:#3f2a3d}
.note-meta span{font-size:10.5px;color:#c9a3bc}
.note-text{white-space:pre-wrap;word-break:break-word;line-height:1.4}
.note-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#fff;padding:1px 7px;border-radius:999px;margin-bottom:4px}
.note-del{display:block;margin-top:4px;font-size:10.5px;color:#c9a3bc;cursor:pointer;text-align:right}
.notes-compose{display:flex;gap:8px;padding:10px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid #fdf1f6}
.notes-compose input{flex:1;border:1px solid #f3d9e8;border-radius:999px;padding:10px 14px;font-size:13.5px}
.notes-compose button{border:none;background:linear-gradient(135deg,#f472b6,#a855f7);color:#fff;font-weight:700;padding:0 18px;border-radius:999px;font-size:13px}
.notes-compose button:disabled{background:#e5d4de;background-image:none}
.notes-warn{margin:8px 16px;padding:8px 10px;background:#fef2f2;color:#b91c1c;font-size:11.5px;border-radius:10px;line-height:1.4}
</style></head><body>
<header><h1>🧸 런던 계획 (데모)</h1><div class="sub">일요일(7/19): 학교 단체 관광 · 대영박물관 (하차 지점 미정, 시나리오 3개) &nbsp;·&nbsp; 월요일(7/20): 기차 쇼핑 데이 — Euston 10:24 도착 → 쇼핑 → Euston 18:46 출발 (Sheffield 왕복)</div>
<button type="button" class="route-open-btn" id="routeOpenBtn">📋 동선 목록 보기</button>
<div class="tabs">
<div class="tab on all" data-d="all" onclick="setDay('all')">전체</div>
<div class="tab" data-d="sun" onclick="setDay('sun')">일요일 · 박물관</div>
<div class="tab" data-d="mon" onclick="setDay('mon')">월요일(20일) · 쇼핑</div>
</div></header>
<div id="routeBackdrop"></div>
<div class="layout">
<div id="sb">
<div class="db show" data-d="sun">
  <div class="dt" style="color:#e11d48">일요일 · 핵심 관광 (순서는 하차 지점따라 유동적)</div>
  <div id="l-nc"></div><div id="l-na"></div><div id="l-nb"></div>
</div>
<div class="db show" data-d="mon">
  <div class="dt" style="color:#0284c7">월요일 · 쇼핑 동선 (Euston ↔ Euston)</div>
  <div id="l-mc"></div><div id="l-mb"></div><div id="l-md"></div>
</div>
</div>
<div id="map"></div>
</div>

<button id="notesFab" class="fab" aria-label="팀 메모 열기">📝<span id="notesBadge" class="badge" hidden>0</span></button>
<div id="notesBackdrop" class="notes-backdrop"></div>
<div id="notesPanel" class="notes-panel">
  <div class="notes-head"><b>팀 메모</b><button id="notesClose" aria-label="닫기">✕</button></div>
  <div class="notes-name"><span>이름</span><input id="noteName" placeholder="이름 입력 (예: 주하)" maxlength="10"></div>
  <div class="notes-name"><span>장소</span><select id="notePlaceTag"><option value="">태그 없음</option></select></div>
  <div id="notesWarn" class="notes-warn" hidden></div>
  <div id="notesList" class="notes-list"></div>
  <div class="notes-compose"><input id="noteInput" placeholder="메모 입력... (Enter로 전송)" maxlength="300"><button id="noteSend">전송</button></div>
</div>

<div id="placeBackdrop" class="notes-backdrop"></div>
<div id="placePanel" class="notes-panel">
  <div class="notes-head"><b id="placeTitle">📍 장소 메모</b><button id="placeClose" aria-label="닫기">✕</button></div>
  <div class="notes-name"><span>이름</span><input id="placeName" placeholder="이름 입력 (예: 주하)" maxlength="10"></div>
  <div class="tag-chips" id="placeTagChips">
    <button type="button" data-tag="visited">✅ 다녀옴</button>
    <button type="button" data-tag="recommend">⭐ 추천</button>
    <button type="button" data-tag="check">❓ 확인필요</button>
  </div>
  <div id="placeWarn" class="notes-warn" hidden></div>
  <div id="placeList" class="notes-list"></div>
  <div class="notes-compose"><input id="placeInput" placeholder="이 장소에 메모 남기기... (Enter로 전송)" maxlength="300"><button id="placeSend">전송</button></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="london_data.js"></script>
<script src="london_app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="london_notes.js"></script>
<script src="place_notes.js"></script>
</body></html>
