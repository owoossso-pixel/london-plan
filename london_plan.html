<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"><title>런던 계획</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:'Inter','Noto Sans KR',-apple-system,"Malgun Gothic",sans-serif;background:#f8fafc;color:#0f172a}
header{padding:16px 20px;background:#fff;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:1000;box-shadow:0 1px 3px rgba(15,23,42,.04)}
header h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em}
header .sub{font-size:12px;color:#64748b;margin-top:4px;line-height:1.5;font-weight:500}
.tabs{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.tab{border:1px solid #e2e8f0;background:#fff;padding:9px 16px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;color:#64748b;-webkit-user-select:none;user-select:none;transition:all .15s}
.tab:hover{background:#f1f5f9}
.tab.on.sun{background:#e11d48;border-color:#e11d48;color:#fff;box-shadow:0 4px 10px rgba(225,29,72,.25)}
.tab.on.mon{background:#0284c7;border-color:#0284c7;color:#fff;box-shadow:0 4px 10px rgba(2,132,199,.25)}
.tab.on.all{background:#0f172a;border-color:#0f172a;color:#fff;box-shadow:0 4px 10px rgba(15,23,42,.2)}
.layout{display:grid;grid-template-columns:380px 1fr;height:calc(100vh - 104px)}
#sb{overflow-y:auto;-webkit-overflow-scrolling:touch;border-right:1px solid #e2e8f0;background:#fff;padding:8px 0 24px}
#map{height:100%;width:100%;min-height:280px}
@media(max-width:820px){
  .layout{display:block;height:auto}
  #map{height:46vh;min-height:260px;position:sticky;top:104px;z-index:5}
  #sb{max-height:none;border-right:none;border-top:1px solid #e2e8f0}
  header h1{font-size:18px}
  .tab{padding:9px 13px;font-size:12.5px}
  .view-toggle{display:flex}
}
.db{display:none}.db.show{display:block}
.dt{font-size:11px;font-weight:800;color:#94a3b8;padding:16px 16px 6px;text-transform:uppercase;letter-spacing:.04em}
.st{display:flex;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid #f1f5f9;min-height:44px;transition:background .1s;box-shadow:inset 4px 0 0 transparent}
.st:active,.st:hover{background:#f8fafc}
.st.now{background:#fffbeb;box-shadow:inset 4px 0 0 #f59e0b}
.bd{flex:0 0 auto;width:26px;height:26px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.bd.sq{border-radius:7px;font-size:10px}
.st b{font-size:14.5px;display:block;margin:0 0 2px;color:#0f172a;font-weight:700}
.st .tm{display:inline-block;font-size:11px;color:#0284c7;font-weight:700;background:#f0f7ff;padding:2px 8px;border-radius:999px;margin-bottom:5px}
.st.now .tm{color:#b45309;background:#fef3c7}
.st .nt{font-size:12.5px;color:#64748b;line-height:1.5}
.st a{display:inline-block;margin-top:7px;font-size:12px;color:#0284c7;text-decoration:none;font-weight:700;padding:2px 0}
.cb{margin:10px 16px 16px;border:1.5px dashed #cbd5e1;border-radius:16px;padding:10px 12px 4px;background:#f8fafc}
.cb .ct{font-size:13px;font-weight:800}.cb .ch{font-size:11.5px;color:#94a3b8;margin-bottom:6px;line-height:1.4;font-weight:500}
.cb .st{padding:9px 0}
.ni{width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(45deg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.ni span{transform:rotate(-45deg)}
.qi{width:21px;height:21px;border-radius:6px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.ar{font-size:15px;font-weight:900;line-height:1;text-shadow:-1px -1px 0 #fff,1px -1px 0 #fff,-1px 1px 0 #fff,1px 1px 0 #fff;pointer-events:none}
.leaflet-popup-content{font-size:13px;font-family:'Inter','Noto Sans KR',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}

/* 모바일 지도/목록 보기 전환 */
.view-toggle{display:none;position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:16px;z-index:1200;gap:8px}
.view-toggle button{border:none;background:#0f172a;color:#fff;font-size:12px;font-weight:700;padding:9px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(0,0,0,.25)}
.view-toggle button.active{background:#0284c7}
body.map-full #sb{display:none}
body.map-full #map{height:calc(100vh - 104px)}
body.list-full #map{display:none}
body.list-full #sb{max-height:none}

/* 팀 메모 FAB */
.fab{position:fixed;right:16px;bottom:calc(16px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;background:#0f172a;color:#fff;border:none;font-size:22px;box-shadow:0 6px 16px rgba(0,0,0,.3);z-index:1300;display:flex;align-items:center;justify-content:center;cursor:pointer}
.badge{position:absolute;top:-4px;right:-4px;background:#e11d48;color:#fff;font-size:11px;font-weight:800;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid #fff}
.notes-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.4);opacity:0;pointer-events:none;transition:opacity .2s;z-index:1400}
.notes-backdrop.open{opacity:1;pointer-events:auto}
.notes-panel{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.2);transform:translateY(105%);transition:transform .25s ease;z-index:1500;display:flex;flex-direction:column;height:72vh;max-height:640px}
.notes-panel.open{transform:translateY(0)}
.notes-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;border-bottom:1px solid #f1f5f9}
.notes-head b{font-size:15px}
.notes-head button{border:none;background:#f1f5f9;width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer}
.notes-name{display:flex;gap:8px;align-items:center;padding:8px 16px;border-bottom:1px solid #f1f5f9}
.notes-name input{flex:1;border:1px solid #e2e8f0;border-radius:10px;padding:7px 10px;font-size:12.5px}
.notes-name span{font-size:11px;color:#94a3b8;font-weight:600}
.notes-list{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.note-row{display:flex}
.note-row.me{justify-content:flex-end}
.note-bubble{position:relative;max-width:82%;background:#f1f5f9;border-radius:14px;padding:8px 12px;font-size:13px}
.note-row.me .note-bubble{background:#e0f2fe}
.note-meta{display:flex;gap:8px;align-items:baseline;margin-bottom:2px}
.note-meta b{font-size:12px;color:#0f172a}
.note-meta span{font-size:10.5px;color:#94a3b8}
.note-text{white-space:pre-wrap;word-break:break-word;line-height:1.4}
.note-tag{display:inline-block;font-size:9.5px;font-weight:800;color:#fff;padding:1px 6px;border-radius:999px;margin-bottom:4px}
.note-del{display:block;margin-top:4px;font-size:10.5px;color:#94a3b8;cursor:pointer;text-align:right}
.notes-compose{display:flex;gap:8px;padding:10px 16px calc(12px + env(safe-area-inset-bottom));border-top:1px solid #f1f5f9}
.notes-compose input{flex:1;border:1px solid #e2e8f0;border-radius:999px;padding:10px 14px;font-size:13.5px}
.notes-compose button{border:none;background:#0284c7;color:#fff;font-weight:700;padding:0 18px;border-radius:999px;font-size:13px}
.notes-compose button:disabled{background:#cbd5e1}
.notes-warn{margin:8px 16px;padding:8px 10px;background:#fef2f2;color:#b91c1c;font-size:11.5px;border-radius:8px;line-height:1.4}
</style></head><body>
<header><h1>런던 계획</h1><div class="sub">일요일(7/19): 학교 단체 관광 · 대영박물관 (하차 지점 미정, 시나리오 3개) &nbsp;·&nbsp; 월요일(7/20): 기차 쇼핑 데이 — Euston 10:24 도착 → 쇼핑 → Euston 18:46 출발 (Sheffield 왕복)</div>
<div class="tabs">
<div class="tab on all" data-d="all" onclick="setDay('all')">전체</div>
<div class="tab" data-d="sun" onclick="setDay('sun')">일요일 · 박물관</div>
<div class="tab" data-d="mon" onclick="setDay('mon')">월요일(20일) · 쇼핑</div>
</div></header>
<div class="layout">
<div id="sb">
<div class="db show" data-d="sun">
  <div class="dt" style="color:#e11d48">일요일 · 핵심 관광 (순서는 하차 지점따라 유동적)</div>
  <div id="l-nc"></div><div id="l-na"></div><div id="l-nb"></div>
</div>
<div class="db show" data-d="mon">
  <div class="dt" style="color:#0284c7">월요일 · 쇼핑 동선 (Euston ↔ Euston)</div>
  <div id="l-mc"></div><div id="l-mb"></div><div id="l-md"></div>
</div>
</div>
<div id="map"></div>
</div>

<button id="notesFab" class="fab" aria-label="팀 메모 열기">📝<span id="notesBadge" class="badge" hidden>0</span></button>
<div id="notesBackdrop" class="notes-backdrop"></div>
<div id="notesPanel" class="notes-panel">
  <div class="notes-head"><b>팀 메모</b><button id="notesClose" aria-label="닫기">✕</button></div>
  <div class="notes-name"><span>이름</span><input id="noteName" placeholder="이름 입력 (예: 주하)" maxlength="10"></div>
  <div id="notesWarn" class="notes-warn" hidden></div>
  <div id="notesList" class="notes-list"></div>
  <div class="notes-compose"><input id="noteInput" placeholder="메모 입력... (Enter로 전송)" maxlength="300"><button id="noteSend">전송</button></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="london_data.js"></script>
<script src="london_app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="london_notes.js"></script>
</body></html>
